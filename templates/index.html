<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-3">Heart Disease Prediction</h3>

        <form action="/predict" method="post" class="row g-2">

            <input class="form-control" name="name" placeholder="Name" required>

            <input class="form-control" name="age" placeholder="Age" required>
            <input class="form-control" name="sex" placeholder="Sex (0/1)" required>
            <input class="form-control" name="cp" placeholder="CP" required>
            <input class="form-control" name="trestbps" placeholder="BP" required>
            <input class="form-control" name="chol" placeholder="Cholesterol" required>
            <input class="form-control" name="fbs" placeholder="FBS" required>
            <input class="form-control" name="restecg" placeholder="ECG" required>
            <input class="form-control" name="thalach" placeholder="Heart Rate" required>
            <input class="form-control" name="exang" placeholder="Angina" required>
            <input class="form-control" name="oldpeak" placeholder="Oldpeak" required>
            <input class="form-control" name="slope" placeholder="Slope" required>
            <input class="form-control" name="ca" placeholder="CA" required>
            <input class="form-control" name="thal" placeholder="Thal" required>

            <button class="btn btn-primary mt-2">Predict</button>
        </form>

        {% if prediction_text %}
            <div class="alert alert-info mt-3 text-center">
                {{ prediction_text }}
            </div>
        {% endif %}

        <a href="/records" class="btn btn-secondary mt-3">View Records</a>
    </div>
</div>

</body>
</html>
