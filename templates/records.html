<!DOCTYPE html>
<html>
<head>
    <title>Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-3">Records Dashboard</h3>

        <a href="/" class="btn btn-primary mb-3">Back</a>

        <table class="table table-bordered table-striped">
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Name</th>
                <th>Features</th>
                <th>Result</th>
                <th>Action</th>
            </tr>

            {% for row in records %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
                <td>{{ row[4] }}</td>
                <td>
                    <a href="/delete/{{ row[0] }}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>

</body>
</html>
